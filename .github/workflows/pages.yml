name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_DEPLOY_PAT != '' && secrets.PAGES_DEPLOY_PAT || github.token }}
          enablement: ${{ secrets.PAGES_DEPLOY_PAT != '' }}

      - name: Require Pages enablement
        if: steps.pages.outcome == 'failure'
        run: |
          printf '%s\n' 'GitHub Pages is not enabled for this repository.'
          printf '%s\n' 'Enable Pages once in repository settings, or add a PAGES_DEPLOY_PAT secret so this workflow can auto-enable it.'
          exit 1

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
